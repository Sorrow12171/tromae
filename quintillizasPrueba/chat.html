    <!-- Cargar scripts en orden: imagenes, logica (con reintentos y logs), luego UI -->

    <script type="module" src="logica.js"></script>

    <script type="module">
        // Importar funciones necesarias de logica.js e imagenes.js
        import { getChicasDisponibles, seleccionarChica, conversar, logQuinti, logErrorAPI, formatearErrorUsuario, getChicasEnChat, actualizarAccionEnCurso, getAccionEnCurso } from './logica.js';
        import { QuintiImagenesPrueba } from './imagenes.js';
        
        let chicaSeleccionadaActual = null;
        let historialMensajesUI = []; // Historial local para la UI
        let accionEnCurso = null; // Mantiene el estado de la acción actual (ej: 'besando', 'chupando')
        let contadorTurnosAccion = 0; // Cuenta cuántos turnos lleva la acción actual
        const MAX_TURNOS_ACCION = 3; // Después de 3 turnos, la acción puede terminar naturalmente
        
        // Inicializar el selector cuando carga la página
        function inicializarSelector() {
            const selectorDiv = document.getElementById('chicasSelector');
            const chicas = getChicasDisponibles();
            
            selectorDiv.innerHTML = '';
            
            chicas.forEach(nombre => {
                const infoChica = QuintiImagenesPrueba[nombre];
                if (infoChica) {
                    const btn = document.createElement('div');
                    btn.className = 'chica-button';
                    btn.onclick = () => seleccionarChicaVisual(nombre);
                    
                    const img = document.createElement('img');
                    img.src = infoChica.imagenSelector;
                    img.alt = infoChica.nombre;
                    
                    const nombreDiv = document.createElement('div');
                    nombreDiv.className = 'nombre-chica';
                    nombreDiv.textContent = infoChica.nombre;
                    
                    btn.appendChild(img);
                    btn.appendChild(nombreDiv);
                    selectorDiv.appendChild(btn);
                }
            });
        }
        
        // Seleccionar una chica visualmente
        function seleccionarChicaVisual(nombre) {
            // Remover selección previa
            document.querySelectorAll('.chica-button').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // Marcar como seleccionada
            event.currentTarget.classList.add('selected');
            chicaSeleccionadaActual = nombre;
            
            // Habilitar botón de comenzar chat
            document.getElementById('startChatBtn').disabled = false;
        }
        
        // Iniciar el chat con la chica seleccionada
        function iniciarChat() {
            if (!chicaSeleccionadaActual) return;
            
            // Seleccionar la chica en la lógica
            seleccionarChica(chicaSeleccionadaActual);
            
            // Ocultar selector, mostrar chat
            document.getElementById('selectorContainer').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            
            // Actualizar información de la chica en el chat
            const infoChica = QuintiImagenesPrueba[chicaSeleccionadaActual];
            document.getElementById('chicaNombreHeader').textContent = infoChica.nombre;
            document.getElementById('chicaNombreInfo').textContent = infoChica.nombre;
            document.getElementById('chicaDescripcion').textContent = infoChica.descripcion;
            document.getElementById('chicaImagenPerfil').src = infoChica.imagenSelector;
            document.getElementById('chicaNombreSaludo').textContent = infoChica.nombre.split(' ')[0];
            document.getElementById('chicaNombreEscribiendo').textContent = infoChica.nombre.split(' ')[0];
            
            // Limpiar mensajes y agregar saludo personalizado
            const messagesDiv = document.getElementById('chatMessages');
            historialMensajesUI = [];
            messagesDiv.innerHTML = `
                <div class="message bot-message">
                    ¡Hola! Soy ${infoChica.nombre.split(' ')[0]} 🌸 ¿En qué puedo ayudarte hoy?
                </div>
            `;
        }
        
        function volverAlInicio() {
            window.location.href = '../index.html';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        /**
         * Función principal para enviar mensajes
         * Implementa logging de errores y muestra imágenes según respuesta de IA
         */

        /**
 * Detecta acciones en el mensaje del usuario para determinar qué tag de imagen usar
 * @param {string} mensajeUsuario - El mensaje original del usuario
 * @returns {string|null} - Tag de imagen detectado o null si no hay acción clara
 */
function detectarAccionEnMensaje(mensajeUsuario) {
    const mensajeLower = mensajeUsuario.toLowerCase();
    
    // Acciones comunes y sus tags correspondientes
    const accionesTags = [
        { patron: /bes|kiss/i, tag: 'besando' },
        { patron: /chup|oral|mamad/i, tag: 'chupando_todo_el_pene' },
        { patron: /punta/i, tag: 'chupando_solo_la_punta_del_pene' },
        { patron: /mitad/i, tag: 'chupando_solo_la_mitad_del_pene' },
        { patron: /bola|testicul/i, tag: 'chupando_bolas' },
        { patron: /doggy|cuatro patas/i, tag: 'doggystyle' },
        { patron: /misioner/i, tag: 'misionero' },
        { patron: /desnud|sin ropa|quita/i, tag: 'desnuda' },
        { patron: /anal/i, tag: 'anal' },
        { patron: /paja|handjob/i, tag: 'handjob_paja' },
        { patron: /cowgirl|encima/i, tag: 'reverse_cowgirl' },
        { patron: /sidefuck|de lad/i, tag: 'sidefuck' },
        { patron: /pie|parad|stand/i, tag: 'standfuck_follando_de_pie' },
        { patron: /ventana/i, tag: 'follando_en_la_ventana' },
        { patron: /aire/i, tag: 'follando_en_el_aire' },
        { patron: /culo|ano/i, tag: 'ichika_licking_anus' },
        { patron: /lam|lamed/i, tag: 'laminedo_pene' },
        { patron: /cuello/i, tag: 'manos_alrededor_del_cuello' }
    ];
    
    for (const accion of accionesTags) {
        if (accion.patron.test(mensajeLower)) {
            return accion.tag;
        }
    }
    
    return null;
}

/**
 * Actualiza el estado de la acción en curso de forma natural
 * @param {string|null} nuevaAccion - La acción detectada en el mensaje actual
 */
function actualizarEstadoAccion(nuevaAccion) {
    if (nuevaAccion) {
        // Nueva acción detectada: reiniciar contador
        if (accionEnCurso !== nuevaAccion) {
            accionEnCurso = nuevaAccion;
            contadorTurnosAccion = 1;
            logQuinti('DEBUG', `Nueva acción iniciada: ${nuevaAccion}`);
        } else {
            // Misma acción continúa
            contadorTurnosAccion++;
            logQuinti('DEBUG', `Acción ${nuevaAccion} continúa (turno ${contadorTurnosAccion}/${MAX_TURNOS_ACCION})`);
        }
    } else {
        // No hay acción explícita en el mensaje
        if (accionEnCurso && contadorTurnosAccion >= MAX_TURNOS_ACCION) {
            // La acción terminó naturalmente después de MAX_TURNOS_ACCION turnos
            logQuinti('DEBUG', `Acción ${accionEnCurso} terminó naturalmente`);
            accionEnCurso = null;
            contadorTurnosAccion = 0;
        } else if (accionEnCurso) {
            // La acción aún está en curso pero el usuario no la mencionó explícitamente
            // Mantenemos la acción para que las imágenes sigan siendo coherentes
            logQuinti('DEBUG', `Acción ${accionEnCurso} se mantiene implícita (turno ${contadorTurnosAccion})`);
        }
    }
}

/**
 * Obtiene el tag de imagen considerando el estado de acción en curso
 * @param {string} respuesta - La respuesta de la IA
 * @param {string} chicaNombre - Nombre de la chica
 * @param {string} mensajeUsuario - El mensaje original del usuario (opcional)
 * @returns {string} - Tag de imagen seleccionado
 */
function seleccionarTagImagen(respuesta, chicaNombre, mensajeUsuario = '') {
    const respuestaLower = respuesta.toLowerCase();
    const infoChica = QuintiImagenesPrueba[chicaNombre];
    if (!infoChica || !infoChica.imagenes) return 'hablando';
    
    const tagsDisponibles = Object.keys(infoChica.imagenes);
    
    // PASO 1: Si hay mensaje del usuario, detectar acción primero (PRIORIDAD MÁXIMA)
    if (mensajeUsuario && mensajeUsuario.trim()) {
        const tagDetectado = detectarAccionEnMensaje(mensajeUsuario);
        if (tagDetectado && tagsDisponibles.includes(tagDetectado)) {
            logQuinti('DEBUG', `Tag forzado por acción del usuario: ${tagDetectado} para ${chicaNombre}`);
            return tagDetectado;
        }
        // Si el tag detectado no existe para esta chica, buscar uno similar
        if (tagDetectado) {
            // Buscar tags que contengan la misma palabra clave
            for (const tag of tagsDisponibles) {
                if (tag.includes(tagDetectado.split('_')[0])) {
                    logQuinti('DEBUG', `Tag similar encontrado: ${tag} para ${chicaNombre}`);
                    return tag;
                }
            }
        }
    }
    
    // PASO 2: Si no hay acción explícita del usuario, verificar si hay una acción en curso
    if (!mensajeUsuario || !detectarAccionEnMensaje(mensajeUsuario)) {
        if (accionEnCurso && tagsDisponibles.includes(accionEnCurso)) {
            logQuinti('DEBUG', `Usando acción en curso: ${accionEnCurso} para ${chicaNombre}`);
            return accionEnCurso;
        }
        // Si la acción en curso no existe para esta chica, buscar una similar
        if (accionEnCurso) {
            for (const tag of tagsDisponibles) {
                if (tag.includes(accionEnCurso.split('_')[0])) {
                    logQuinti('DEBUG', `Tag similar a acción en curso: ${tag} para ${chicaNombre}`);
                    return tag;
                }
            }
        }
    }
    
    // PASO 3: Si no hay acción en curso, buscar en la respuesta de la IA
    // Buscar coincidencias directas con tags
    for (const tag of tagsDisponibles) {
        const tagNormalizado = tag.toLowerCase().replace(/_/g, ' ');
        if (respuestaLower.includes(tagNormalizado)) {
            return tag;
        }
    }
    
    // Búsquedas específicas en la respuesta
    if (respuestaLower.includes('bes') || respuestaLower.includes('kiss')) {
        if (tagsDisponibles.includes('besando')) return 'besando';
    }
    if (respuestaLower.includes('chup') || respuestaLower.includes('oral')) {
        for (const tag of tagsDisponibles) {
            if (tag.includes('chupando')) return tag;
        }
    }
    if (respuestaLower.includes('desnud') || respuestaLower.includes('sin ropa')) {
        if (tagsDisponibles.includes('desnuda')) return 'desnuda';
    }
    if (respuestaLower.includes('doggy') || respuestaLower.includes('cuatro patas')) {
        if (tagsDisponibles.includes('doggystyle')) return 'doggystyle';
    }
    if (respuestaLower.includes('misionero') || respuestaLower.includes('encima')) {
        if (tagsDisponibles.includes('misionero')) return 'misionero';
    }
    
    return tagsDisponibles.includes('hablando') ? 'hablando' : tagsDisponibles[0] || 'normal';
}
        
        /**
         * Obtiene la URL de una imagen para una chica y tag específicos
         */
        function obtenerURLImagen(nombreChica, tag) {
            if (!QuintiImagenesPrueba || !QuintiImagenesPrueba[nombreChica]) {
                return null;
            }
            
            const chicaData = QuintiImagenesPrueba[nombreChica];
            
            if (tag === 'normal' || tag === 'hablando') {
                return chicaData.imagenSelector || chicaData.imagenes?.['hablando'] || null;
            }
            
            return chicaData.imagenes?.[tag] || chicaData.imagenes?.['hablando'] || chicaData.imagenSelector || null;
        }

        let lastUserMessage = null; // Para permitir reintentar después de un error

                const response = await conversar(message);

                // Detectar si hay múltiples respuestas de diferentes chicas

                const hayMultiplesChicas = chicasEnChatSet.size > 1;

                const hayRespuestasIndividuales = response.respuestasIndividuales && response.respuestasIndividuales.length > 0;

                if (hayRespuestasIndividuales) {
                    // CASO ÓPTIMO: Tenemos respuestas individuales de cada chica desde la lógica
                    // Mostrar CADA respuesta en un mensaje COMPLETAMENTE SEPARADO con su propia imagen
                    for (let idx = 0; idx < response.respuestasIndividuales.length; idx++) {
                        const respuestaIndividual = response.respuestasIndividuales[idx];
                        const chicaNombre = respuestaIndividual.chica;
                        const chicaRespuesta = respuestaIndividual.respuesta;
                        
                        if (!chicaRespuesta) continue;
                        
                        // Crear mensaje SEPARADO para esta chica específica

                        // Obtener imagen de esta chica específica usando SU PROPIO tag
                        // IMPORTANTE: Pasar el mensaje del usuario para que la imagen sea acorde a la acción
                        const infoChica = QuintiImagenesPrueba[chicaNombre];
                        let imagenURL = null;
                        if (infoChica) {
                            // Seleccionar imagen basada en el mensaje del usuario (PRIORIDAD) y la respuesta
                            const tagImagen = seleccionarTagImagen(chicaRespuesta, chicaNombre, message);
                            imagenURL = obtenerURLImagen(chicaNombre, tagImagen);
                            logQuinti('DEBUG', `Imagen para ${chicaNombre}`, { tag: tagImagen, url: imagenURL, mensajeUsuario: message.substring(0, 50) });
                        }

                        // Construir contenido: PRIMERO TEXTO con nombre, luego imagen al final
                        let contenidoHTML = `<div style="margin-bottom: 15px; line-height: 1.6;"><strong>${chicaNombre}:</strong> ${chicaRespuesta}</div>`;
                        if (imagenURL) {
                            contenidoHTML += `<img src="${imagenURL}" alt="${chicaNombre}" style="max-width: 400px; max-height: 500px; width: auto; height: auto; border-radius: 12px; display: block; margin: 15px auto 10px auto; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); border: 3px solid rgba(255, 255, 255, 0.5);">`;
                        }

                        botMsgDiv.innerHTML = contenidoHTML;
                        messagesDiv.appendChild(botMsgDiv);
                        
                        // Scroll después de cada mensaje
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        
                        // Pequeña pausa entre mensajes de diferentes chicas para efecto visual
                        if (idx < response.respuestasIndividuales.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 400));
                        }
                    }
                } else if (hayMultiplesChicas) {
                    // Hay múltiples chicas en el chat - cada una debe tener su propio mensaje
                    // Primero, obtener todas las chicas que deberían responder
                    const chicasQueDebenResponder = Array.from(chicasEnChatSet);
                    
                    // Intentar extraer respuestas individuales del formato [Nombre]: respuesta
                    const responseParts = response.respuesta.split(/\[(Ichika|Nino|Miku|Yotsuba|Itsuki)\]:/gi);
                    const respuestasPorChica = new Map();
                    
                    // Procesar partes para extraer respuestas por chica
                    for (let i = 1; i < responseParts.length; i += 2) {
                        const chicaNombre = responseParts[i];
                        const chicaRespuesta = responseParts[i + 1]?.trim() || '';
                        if (chicaRespuesta && !respuestasPorChica.has(chicaNombre)) {
                            respuestasPorChica.set(chicaNombre, chicaRespuesta);
                        }
                    }
                    
                    // Si la IA no generó respuestas separadas para todas las chicas,
                    // necesitamos generar respuestas únicas para cada una
                    if (respuestasPorChica.size < chicasQueDebenResponder.length) {
                        logQuinti('WARN', 'La IA no generó respuestas separadas para todas las chicas', {
                            chicasQueFaltan: chicasQueDebenResponder.filter(c => !respuestasPorChica.has(c)),
                            respuestasGeneradas: Array.from(respuestasPorChica.keys())
                        });
                        
                        // Para las chicas que no tienen respuesta individual, creamos una respuesta basada en el contexto
                        // Usamos diferentes frases introductorias para cada chica para evitar repetición
                        const frasesIntroduccion = {
                            'Ichika': ['*sonríe coquetamente*', '*se acerca con elegancia*', '*ríe suavemente*'],
                            'Nino': ['*cruza los brazos*', '*bufa molesta*', '*te mira fijamente*'],
                            'Miku': ['*se sonroja tímidamente*', '*habla en voz baja*', '*juega con su cabello*'],
                            'Yotsuba': ['*sonríe energéticamente*', '*saluda con entusiasmo*', '*hace una pose divertida*'],
                            'Itsuki': ['*ajusta sus gafas*', '*habla seriamente*', '*mira con determinación*']
                        };
                        
                        for (const chica of chicasQueDebenResponder) {
                            if (!respuestasPorChica.has(chica)) {
                                // Generar una respuesta única para esta chica usando su personalidad
                                const intros = frasesIntroduccion[chica] || ['*responde*'];
                                const introElegida = intros[Math.floor(Math.random() * intros.length)];
                                
                                // Crear una respuesta contextual basada en lo que dijo el usuario
                                const contextoRespuesta = `${introElegida} ${response.respuesta.replace(/^\[.*?\]:\s*/g, '')}`;
                                respuestasPorChica.set(chica, contextoRespuesta);

                        }
                    }
                    
                    // Mostrar CADA respuesta en un mensaje COMPLETAMENTE SEPARADO
                    const chicasArray = Array.from(respuestasPorChica.entries());
                    for (let idx = 0; idx < chicasArray.length; idx++) {
                        const [chicaNombre, chicaRespuesta] = chicasArray[idx];
                        
                        if (!chicaRespuesta) continue;
                        
                        // Crear mensaje SEPARADO para esta chica específica
                        const botMsgDiv = document.createElement('div');

                            const tagImagen = seleccionarTagImagen(chicaRespuesta, chicaNombre, message);
                            imagenURL = obtenerURLImagen(chicaNombre, tagImagen);
                            logQuinti('DEBUG', `Imagen para ${chicaNombre}`, { tag: tagImagen, url: imagenURL, mensajeUsuario: message.substring(0, 50) });

                        // Construir contenido: PRIMERO TEXTO con nombre, luego imagen al final
                        let contenidoHTML = `<div style="margin-bottom: 15px; line-height: 1.6;"><strong>${chicaNombre}:</strong> ${chicaRespuesta}</div>`;
                        if (imagenURL) {

                        }

                        botMsgDiv.innerHTML = contenidoHTML;
                        messagesDiv.appendChild(botMsgDiv);
                        
                        // Scroll después de cada mensaje
                        messagesDiv.scrollTop = messagesDiv.scrollHeight;
                        
                        // Pequeña pausa entre mensajes de diferentes chicas para efecto visual
                        if (idx < chicasArray.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 400));
                        }
                    }
                } else if (hayRespuestasConFormato && matches.length > 1) {
                    // Caso especial: múltiples respuestas detectadas pero solo una chica en chat
                    // Esto puede pasar si la IA genera formato [Nombre]: sin razón
                    // Dividir y mostrar cada respuesta separada
                    const responseParts = response.respuesta.split(/\[(Ichika|Nino|Miku|Yotsuba|Itsuki)\]:/gi);

                    for (let i = 1; i < responseParts.length; i += 2) {
                        const chicaNombre = responseParts[i];

                        if (chicaRespuesta) {

                            let imagenURL = null;
                            if (infoChica) {
                                const tagImagen = seleccionarTagImagen(chicaRespuesta, chicaNombre, message);
                                imagenURL = obtenerURLImagen(chicaNombre, tagImagen);
                                logQuinti('DEBUG', `Imagen para ${chicaNombre}`, { tag: tagImagen, url: imagenURL, mensajeUsuario: message.substring(0, 50) });

                            let contenidoHTML = `<div style="margin-bottom: 15px; line-height: 1.6;"><strong>${chicaNombre}:</strong> ${chicaRespuesta}</div>`;

                            messagesDiv.appendChild(botMsgDiv);

                            if (i + 2 < responseParts.length) {
                                await new Promise(resolve => setTimeout(resolve, 300));

                } else {
                    // Respuesta simple de una sola chica
                    const botMsgDiv = document.createElement('div');
                    botMsgDiv.className = 'message bot-message';

                    // Construir contenido: PRIMERO TEXTO, luego imagen al final
                    let contenidoHTML = `<div style="margin-bottom: 15px; line-height: 1.6;">${response.respuesta}</div>`;
                    if (response.imagen_url) {

                logQuinti('INFO', 'Mensaje respondido exitosamente', {

                    chicasEnChat: response.chicasEnChat
                });
                
            } catch (error) {

                // Log detallado del error
                logErrorAPI('sendMessage', error, { mensaje: message });
                
                const errorMsgDiv = document.createElement('div');
                errorMsgDiv.className = 'message bot-message';

            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            const input = document.getElementById('userInput');
            input.value = lastUserMessage;

            // Reenviar el mensaje

        }

        }
        
        // Exponer funciones de historias paralelas globalmente
        window.abrirHistoriasParalelas = abrirHistoriasParalelas;
        window.cerrarHistoriasParalelas = cerrarHistoriasParalelas;
        window.iniciarHistoriaParalela = iniciarHistoriaParalela;
        
        // Inicializar cuando carga la página
        window.onload = cargarNombreGuardado;
    </script>
</body>
</html>
